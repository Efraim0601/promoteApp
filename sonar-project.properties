# SonarQube configuration for the Afriland Carte Promote portal (backend Java + frontend Angular).
#
# RECOMMENDED for the Java backend — use the Maven plugin (auto-detects classpath & coverage):
#   cd backend && mvn clean verify        # runs tests + writes target/site/jacoco/jacoco.xml
#   cd backend && mvn sonar:sonar -Dsonar.host.url=http://localhost:9000 -Dsonar.login=<token>
#
# This file is for the standalone sonar-scanner CLI (covers both modules at once). Run
# `cd backend && mvn clean verify` first so the coverage report and compiled classes exist.

sonar.projectKey=afriland-promote
sonar.projectName=Afriland Carte Promote
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# ---- sources & tests ----
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java
sonar.test.inclusions=**/*Test.java,**/*.spec.ts

# ---- Java analysis (compile with `mvn verify` first) ----
sonar.java.source=17
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
# For full precision, copy deps once: cd backend && mvn dependency:copy-dependencies
sonar.java.libraries=backend/target/dependency/*.jar
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# ---- Frontend coverage (run `cd frontend && npm test` → lcov) ----
sonar.typescript.lcov.reportPaths=frontend/coverage/frontend/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov.info

# ---- exclusions: generated / vendored / non-source ----
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/*.spec.ts,frontend/src/main.ts,frontend/src/environments/**
sonar.coverage.exclusions=**/*.spec.ts,**/PromoteApplication.java,**/config/**,**/bootstrap/**
