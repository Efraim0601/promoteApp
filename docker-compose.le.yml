# Overlay HTTPS « Let's Encrypt » — Caddy reverse proxy sur les ports STANDARD 80 + 443
# avec un certificat de confiance obtenu et renouvelé automatiquement via ACME.
#
# À utiliser quand vous avez un VRAI nom de domaine pointant vers ce serveur et que les
# ports 80/443 sont libres. Pas d'avertissement navigateur (contrairement à
# docker-compose.tls.yml qui utilise un certificat auto-signé sur un port custom).
#
# Usage :
#   1) dans .env : DOMAIN=promote.mondomaine.cm , ACME_EMAIL=ops@mondomaine.cm ,
#      WEB_PORT=127.0.0.1:8973 (garder le front hors interface publique),
#      APP_CORS_ALLOWED_ORIGINS=https://promote.mondomaine.cm
#   2) ./deploy.sh --le --fresh
#   3) ouvrir les ports :  sudo ufw allow 80/tcp && sudo ufw allow 443/tcp
#   -> ouvrir https://promote.mondomaine.cm
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [frontend]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env, e.g. promote.mondomaine.cm}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./deploy/Caddyfile.le:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [promote]

volumes:
  caddy_data:
  caddy_config:
