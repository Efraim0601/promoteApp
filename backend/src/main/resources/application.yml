# Default profile = PostgreSQL (docker / VPS). Use SPRING_PROFILES_ACTIVE=dev for local H2.
spring:
  application:
    name: promote-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/promote}
    username: ${SPRING_DATASOURCE_USERNAME:promote}
    password: ${SPRING_DATASOURCE_PASSWORD:promote}
    hikari:
      # More concurrent DB connections so dashboard polling doesn't queue on a tiny pool.
      maximum-pool-size: ${DB_POOL_MAX:25}
      minimum-idle: ${DB_POOL_MIN:5}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  # SMTP (Office 365 by default). Set MAIL_USERNAME / MAIL_PASSWORD in .env.
  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp
    test-connection: false

app:
  admin:
    email: ${ADMIN_EMAIL:admin@afrilandfirstbank.com}
    password: ${ADMIN_PASSWORD:promote}
    name: ${ADMIN_NAME:Administrateur Promote}
  print:
    email: ${PRINT_EMAIL:imprimeur.promote@afrilandfirstbank.com}
    password: ${PRINT_PASSWORD:promote}
    name: ${PRINT_NAME:Point d'impression}
  cashier:
    email: ${CASHIER_EMAIL:caissier.promote@afrilandfirstbank.com}
    password: ${CASHIER_PASSWORD:promote}
    name: ${CASHIER_NAME:Caissier Promote}
  seed:
    test-agent: ${SEED_TEST_AGENT:true}   # set false in production to skip the demo agent
  # Public URL of the app, used in account emails (login link). e.g. https://<host>:8443
  public-url: ${APP_PUBLIC_URL:http://localhost:8973}
  mail:
    enabled: ${MAIL_ENABLED:true}                 # set false to disable sending (e.g. local dev)
    from: ${MAIL_FROM:${MAIL_USERNAME:agent_dri_03@afrilandfirstbank.com}}
    from-name: ${MAIL_FROM_NAME:Afriland Carte Promote}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-secret-must-be-at-least-32-bytes-long}
    expiration-hours: 12
  payment:
    provider: ${APP_PAYMENT_PROVIDER:simulated}   # simulated | trustpayway
  trustpayway:
    base-url: ${TRUSTPAYWAY_BASE_URL:}            # e.g. https://api.trustpayway.com (no trailing /)
    secret-key: ${TRUSTPAYWAY_SECRET_KEY:}        # long-lived SECRET_KEY (login Bearer)
    application-id: ${TRUSTPAYWAY_APPLICATION_ID:}
    notif-url: ${TRUSTPAYWAY_NOTIF_URL:}          # public URL of our webhook (see below)
    webhook-secret: ${TRUSTPAYWAY_WEBHOOK_SECRET:} # optional: required in X-Webhook-Secret if set
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost,http://localhost:8973}
  storage:
    provider: ${APP_STORAGE_PROVIDER:s3}   # s3 (MinIO/AWS) | memory (dev/test)
    s3:
      endpoint: ${S3_ENDPOINT:http://minio:9000}
      region: ${S3_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:promote}
      secret-key: ${S3_SECRET_KEY:promote-minio-secret}
      bucket: ${S3_BUCKET:kyc-selfies}

server:
  port: ${SERVER_PORT:8390}
  forward-headers-strategy: framework
  tomcat:
    max-http-form-post-size: 8MB
    max-swallow-size: 8MB

logging:
  level:
    org.springframework.security: INFO
