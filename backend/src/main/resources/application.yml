# Default profile = PostgreSQL (docker / VPS). Use SPRING_PROFILES_ACTIVE=dev for local H2.
spring:
  application:
    name: promote-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/promote}
    username: ${SPRING_DATASOURCE_USERNAME:promote}
    password: ${SPRING_DATASOURCE_PASSWORD:promote}
    hikari:
      # More concurrent DB connections so dashboard polling doesn't queue on a tiny pool.
      maximum-pool-size: ${DB_POOL_MAX:25}
      minimum-idle: ${DB_POOL_MIN:5}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  # SMTP (Office 365 by default). Set MAIL_USERNAME / MAIL_PASSWORD in .env.
  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp
    test-connection: false

app:
  admin:
    email: ${ADMIN_EMAIL:admin@afrilandfirstbank.com}
    password: ${ADMIN_PASSWORD:promote}
    name: ${ADMIN_NAME:Administrateur Promote}
  print:
    email: ${PRINT_EMAIL:imprimeur.promote@afrilandfirstbank.com}
    password: ${PRINT_PASSWORD:promote}
    name: ${PRINT_NAME:Point d'impression}
  cashier:
    email: ${CASHIER_EMAIL:caissier.promote@afrilandfirstbank.com}
    password: ${CASHIER_PASSWORD:promote}
    name: ${CASHIER_NAME:Caissier Promote}
  seed:
    test-agent: ${SEED_TEST_AGENT:true}   # set false in production to skip the demo agent
  kyc:
    cni-ocr:
      # OCR the captured CNI front and cross-check it against the typed data (advisory warning,
      # never blocking). OFF by default — turn on once Tesseract + fra tessdata are validated.
      enabled: ${KYC_CNI_OCR_ENABLED:false}
      # Tesseract language / tessdata dir; default to the SARA receipt OCR setup already in place.
      lang: ${KYC_CNI_OCR_LANG:${APP_RECEIPT_OCR_LANG:fra}}
      datapath: ${KYC_CNI_OCR_DATAPATH:${APP_RECEIPT_OCR_DATAPATH:}}
  # Public BASE URL of the app (root, NOT .../client) — used to build the login link in account
  # emails. The welcome email appends /login to it. e.g. https://<host> or https://<host>:8443
  public-url: ${APP_PUBLIC_URL:http://localhost:8973}
  mail:
    enabled: ${MAIL_ENABLED:true}                 # set false to disable sending (e.g. local dev)
    from: ${MAIL_FROM:${MAIL_USERNAME:agent_dri_03@afrilandfirstbank.com}}
    from-name: ${MAIL_FROM_NAME:Afriland Carte Promote}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-secret-must-be-at-least-32-bytes-long}
    expiration-hours: 12
  payment:
    provider: ${APP_PAYMENT_PROVIDER:simulated}   # simulated | trustpayway
    # Push the aggregator call OFF the HTTP request thread: create() returns `pending`
    # immediately and a background worker does the USSD push; the client polls /status and
    # the webhook reconciles. Decouples our throughput from the gateway's latency.
    # false = legacy synchronous behaviour (the request waits for the gateway), unchanged.
    async: ${APP_PAYMENT_ASYNC:false}
    # Public /status polling guard: the gateway get-status call is made OUTSIDE any DB transaction and
    # is rate-limited per order, so heavy polling can't tie up DB connections (which exhausted the pool).
    # The webhook + reconcile sweep remain the primary settlement paths.
    status-pull:
      min-interval-ms: ${PAYMENT_STATUS_PULL_MIN_INTERVAL_MS:8000}  # ≥ this between live pulls per order
      grace-ms: ${PAYMENT_STATUS_PULL_GRACE_MS:5000}                # let the webhook arrive first after create
    pool:
      # Sizing rule of thumb: max ≈ peak_tx_per_sec × avg_gateway_latency_seconds.
      # The queue is kept small so the pool grows to `max` quickly under load; once both are
      # saturated, CallerRunsPolicy makes the request thread run the push itself (graceful
      # back-pressure — a payment is never silently dropped).
      core: ${PAYMENT_POOL_CORE:32}
      max: ${PAYMENT_POOL_MAX:256}
      queue: ${PAYMENT_POOL_QUEUE:64}
      keep-alive-seconds: ${PAYMENT_POOL_KEEPALIVE:60}
    reconcile:
      # Sweep that rescues `pending` payments whose webhook never arrived (get-status fallback)
      # and expires very old ones. Idempotent (only moves a still-pending row). With several
      # backend replicas, enable it on EXACTLY ONE instance to avoid duplicate gateway polls.
      enabled: ${PAYMENT_RECONCILE:false}
      interval-ms: ${PAYMENT_RECONCILE_INTERVAL_MS:300000}      # 5 min between sweeps
      pull-after-seconds: ${PAYMENT_RECONCILE_PULL_AFTER:20}   # min age before we pull live status
      lookback-seconds: ${PAYMENT_RECONCILE_LOOKBACK_SECONDS:3600} # scheduled sweep only: orders from the last hour
      # Recovery pass: also re-pull live status for orders already `failed` created in the last N seconds,
      # so a late COMPLETED (gateway settled after our local timeout / EXPIRED) is recovered to `paid`.
      # 0 = disabled (no extra gateway calls). A modest window (e.g. 1800 = 30 min) re-checks each failed
      # row a few times before it ages out, bounded by `batch`.
      recheck-failed-seconds: ${PAYMENT_RECONCILE_RECHECK_FAILED:0}
      # Manual reconciliation (POST /api/payment/reconcile?hours=N) window cap, in HOURS — independent
      # of the scheduled lookback above so an operator can reconcile the last 24 h / 48 h on demand.
      # The per-run batch cap still bounds the work. Default 168 h (7 days).
      manual-max-hours: ${PAYMENT_RECONCILE_MANUAL_MAX_HOURS:168}
      expire-after-seconds: ${PAYMENT_RECONCILE_EXPIRE_AFTER:900} # 15 min: force-fail beyond any USSD window
      batch: ${PAYMENT_RECONCILE_BATCH:200}                   # max rows processed per tick (never findAll)
      batch-timeout-seconds: ${PAYMENT_RECONCILE_BATCH_TIMEOUT:120}
      pool:
        core: ${PAYMENT_RECONCILE_POOL_CORE:4}
        max: ${PAYMENT_RECONCILE_POOL_MAX:16}
        queue: ${PAYMENT_RECONCILE_POOL_QUEUE:64}
    # Block a second TrustPayWay debit for the same MoMo number + amount within this window.
    debit-guard-seconds: ${PAYMENT_DEBIT_GUARD_SECONDS:300}
  trustpayway:
    base-url: ${TRUSTPAYWAY_BASE_URL:}            # e.g. https://api.trustpayway.com (no trailing /)
    secret-key: ${TRUSTPAYWAY_SECRET_KEY:}        # long-lived SECRET_KEY (login Bearer)
    application-id: ${TRUSTPAYWAY_APPLICATION_ID:}
    notif-url: ${TRUSTPAYWAY_NOTIF_URL:}          # public URL of our webhook (see below)
    webhook-secret: ${TRUSTPAYWAY_WEBHOOK_SECRET:} # optional: required in X-Webhook-Secret if set
    # Hard caps so a slow/hung aggregator can never block a worker thread indefinitely. Keep the read
    # timeout well under the USSD prompt window but low enough that a hung push frees its worker fast
    # (the gateway call no longer holds a DB connection — see SubscriptionService.pushGateway).
    connect-timeout-ms: ${TRUSTPAYWAY_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${TRUSTPAYWAY_READ_TIMEOUT_MS:25000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost,http://localhost:8973}
  storage:
    provider: ${APP_STORAGE_PROVIDER:s3}   # s3 (MinIO/AWS) | memory (dev/test)
    s3:
      endpoint: ${S3_ENDPOINT:http://minio:9000}
      region: ${S3_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:promote}
      secret-key: ${S3_SECRET_KEY:promote-minio-secret}
      bucket: ${S3_BUCKET:kyc-selfies}

server:
  port: ${SERVER_PORT:8390}
  forward-headers-strategy: framework
  tomcat:
    max-http-form-post-size: 8MB
    max-swallow-size: 8MB

logging:
  level:
    org.springframework.security: INFO
