# HTTPS overlay — Caddy reverse proxy on a CUSTOM port (default 8443), so it does
# NOT conflict with anything already using 80/443 on the host. Uses Caddy's local CA
# (`tls internal`), so no port 80 / Let's Encrypt is needed — HTTPS works on any port,
# which is what the browser camera (getUserMedia) requires.
#
# Usage:
#   1) set DOMAIN (e.g. <server-ip>.sslip.io) and optionally CADDY_HTTPS_PORT in .env,
#      plus WEB_PORT=127.0.0.1:8973 (keep the frontend off the public interface).
#   2) ./deploy.sh --tls --fresh
#   3) open the chosen port:  sudo ufw allow ${CADDY_HTTPS_PORT}/tcp   (default 8443)
#   -> open https://<DOMAIN>:<CADDY_HTTPS_PORT>  (accept the one-time cert warning)
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [frontend]
    ports:
      - "${CADDY_HTTPS_PORT:-8443}:${CADDY_HTTPS_PORT:-8443}"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env, e.g. 62.169.26.178.sslip.io}
      CADDY_HTTPS_PORT: ${CADDY_HTTPS_PORT:-8443}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [promote]

volumes:
  caddy_data:
  caddy_config:
