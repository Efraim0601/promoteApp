server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # uploads (KYC selfie) can be a few MB
    client_max_body_size 8m;

    # API → Spring Boot backend (service name on the compose network).
    # Use Docker's embedded DNS (127.0.0.11) + a variable in proxy_pass so the
    # `backend` hostname is re-resolved per request. Without this, nginx caches
    # the backend's IP at startup and keeps hitting the stale IP (→ 502) whenever
    # the backend container restarts and gets a new IP on the bridge network.
    #
    # Horizontal scaling: when the backend is scaled to several replicas
    # (`docker compose up -d --scale backend=N`), Docker DNS returns one A record
    # per replica and nginx round-robins across them per request — no upstream{}
    # block needed (which would pin a single IP at startup). proxy_next_upstream
    # lets a request fail over to another replica if one is down or restarting.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8390;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Fail over to another replica on a connection error / 502-503 (idempotent reads & retried
        # POSTs are safe: a duplicate gateway push reuses the same orderId, a duplicate create is
        # caught by the resume-window de-dup). Timeouts must exceed the backend's longest synchronous
        # request: manual reconciliation (POST /api/payment/reconcile) runs up to batch-timeout (120 s)
        # for a 24-48 h window, so a 30 s read timeout returned a premature 504 ("Échec de la
        # réconciliation"). We also drop "timeout" from proxy_next_upstream: replaying that POST hit the
        # sweep mutex (reconcile_already_running) and surfaced as a failure while the first sweep ran fine.
        proxy_connect_timeout 5s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_next_upstream error http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # long-cache hashed build assets (incl. the self-hosted MediaPipe runtime/model used by the
    # smart KYC capture — ~25 MB, fetched once then served from the browser cache thereafter).
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|wasm|task)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
