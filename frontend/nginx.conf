server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # uploads (KYC selfie) can be a few MB
    client_max_body_size 8m;

    # API → Spring Boot backend (service name on the compose network).
    # Use Docker's embedded DNS (127.0.0.11) + a variable in proxy_pass so the
    # `backend` hostname is re-resolved per request. Without this, nginx caches
    # the backend's IP at startup and keeps hitting the stale IP (→ 502) whenever
    # the backend container restarts and gets a new IP on the bridge network.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8390;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # long-cache hashed build assets
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
