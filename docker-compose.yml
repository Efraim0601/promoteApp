services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-promote}
      POSTGRES_USER: ${POSTGRES_USER:-promote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promote}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promote} -d ${POSTGRES_DB:-promote}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [promote]

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-promote}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-promote}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-promote}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-secret-must-be-at-least-32-bytes-long}
      APP_PAYMENT_PROVIDER: ${APP_PAYMENT_PROVIDER:-simulated}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost}
    networks: [promote]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "${HTTP_PORT:-80}:80"
    networks: [promote]

volumes:
  pgdata:

networks:
  promote:
    driver: bridge
