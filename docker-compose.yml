services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-promote}
      POSTGRES_USER: ${POSTGRES_USER:-promote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promote}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Not published on the host by default (no port conflict). For admin access use
    # `docker compose exec db psql -U promote -d promote`, or temporarily uncomment
    # the line below (bound to localhost only) and pick a free DB_PORT in .env.
    # ports:
    #   - "127.0.0.1:${DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promote} -d ${POSTGRES_DB:-promote}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [promote]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-promote}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-promote-minio-secret}
    volumes:
      - minio_data:/data
    # Neither the S3 API (9000) nor the console (9001) is published on the host by
    # default (no port conflict). To reach the console temporarily, uncomment below
    # (bound to localhost only) and pick a free MINIO_CONSOLE_PORT in .env.
    # ports:
    #   - "127.0.0.1:${MINIO_CONSOLE_PORT:-9011}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [promote]

  backend:
    build: ./backend
    restart: unless-stopped
    # Horizontally scalable: no container_name and no published host port, so it can run as N
    # replicas — `docker compose up -d --scale backend=3` (or BACKEND_SCALE=3 ./deploy.sh). The
    # frontend nginx load-balances across them via Docker DNS (see frontend/nginx.conf). The app is
    # stateless (JWT), so no sticky sessions are needed. NOTE: enable the reconciliation sweep
    # (PAYMENT_RECONCILE=true) carefully — it runs on every replica; that is idempotent but, for a
    # single runner, prefer a distributed lock (ShedLock) in a future iteration.
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SERVER_PORT: 8390
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-promote}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-promote}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-promote}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-secret-must-be-at-least-32-bytes-long}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@afrilandfirstbank.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-promote}
      ADMIN_NAME: ${ADMIN_NAME:-Administrateur Promote}
      SEED_TEST_AGENT: ${SEED_TEST_AGENT:-true}
      PRINT_EMAIL: ${PRINT_EMAIL:-imprimeur.promote@afrilandfirstbank.com}
      PRINT_PASSWORD: ${PRINT_PASSWORD:-promote}
      PRINT_NAME: ${PRINT_NAME:-Point d'impression}
      APP_PAYMENT_PROVIDER: ${APP_PAYMENT_PROVIDER:-simulated}
      # Push MoMo off the HTTP thread (create returns pending; worker calls TrustPayWay).
      APP_PAYMENT_ASYNC: ${APP_PAYMENT_ASYNC:-false}
      # Periodic sweep for stuck pending payments (enable on ONE backend replica only).
      PAYMENT_RECONCILE: ${PAYMENT_RECONCILE:-false}
      TRUSTPAYWAY_BASE_URL: ${TRUSTPAYWAY_BASE_URL:-}
      TRUSTPAYWAY_SECRET_KEY: ${TRUSTPAYWAY_SECRET_KEY:-}
      TRUSTPAYWAY_APPLICATION_ID: ${TRUSTPAYWAY_APPLICATION_ID:-}
      TRUSTPAYWAY_NOTIF_URL: ${TRUSTPAYWAY_NOTIF_URL:-}
      TRUSTPAYWAY_WEBHOOK_SECRET: ${TRUSTPAYWAY_WEBHOOK_SECRET:-}
      TRUSTPAYWAY_CONNECT_TIMEOUT_MS: ${TRUSTPAYWAY_CONNECT_TIMEOUT_MS:-5000}
      TRUSTPAYWAY_READ_TIMEOUT_MS: ${TRUSTPAYWAY_READ_TIMEOUT_MS:-45000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8973}
      # public URL used in account emails (login link), e.g. https://<host>:8443
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      # SMTP (Office 365 by default) — set MAIL_USERNAME / MAIL_PASSWORD in .env
      MAIL_HOST: ${MAIL_HOST:-smtp.office365.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      # object storage (MinIO) — S3 API reached over the internal network
      APP_STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-promote}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-promote-minio-secret}
      S3_BUCKET: ${S3_BUCKET:-kyc-selfies}
    # backend is NOT published to the host — reached only via the frontend nginx proxy
    networks: [promote]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "${WEB_PORT:-8973}:80"
    networks: [promote]

volumes:
  pgdata:
  minio_data:

networks:
  promote:
    driver: bridge
