services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-promote}
      POSTGRES_USER: ${POSTGRES_USER:-promote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promote}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bound to localhost only on an uncommon port — never exposed publicly.
    ports:
      - "127.0.0.1:${DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promote} -d ${POSTGRES_DB:-promote}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [promote]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-promote}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-promote-minio-secret}
    volumes:
      - minio_data:/data
    # S3 API (9000) stays internal to the Docker network; only the admin console
    # is exposed, on localhost, on an uncommon port.
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9011}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [promote]

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SERVER_PORT: 8390
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-promote}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-promote}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-promote}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-secret-must-be-at-least-32-bytes-long}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@afrilandfirstbank.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-promote}
      ADMIN_NAME: ${ADMIN_NAME:-Administrateur Promote}
      SEED_TEST_AGENT: ${SEED_TEST_AGENT:-true}
      APP_PAYMENT_PROVIDER: ${APP_PAYMENT_PROVIDER:-simulated}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8973}
      # object storage (MinIO) — S3 API reached over the internal network
      APP_STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-promote}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-promote-minio-secret}
      S3_BUCKET: ${S3_BUCKET:-kyc-selfies}
    # backend is NOT published to the host — reached only via the frontend nginx proxy
    networks: [promote]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "${WEB_PORT:-8973}:80"
    networks: [promote]

volumes:
  pgdata:
  minio_data:

networks:
  promote:
    driver: bridge
